{% extends "base.html" %}

{% block stylesheets %}
  {{ super() }}
  {% if request.path == "/" %}
    <style id="aegis-mainpage-bg-style">
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      main {
        height: calc(100vh - 86px);
        min-height: calc(100vh - 86px);
        padding-bottom: 0 !important;
        overflow: hidden;
      }

      .footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 1020;
        margin-top: 0 !important;
        padding-top: 0 !important;
        padding-bottom: 0.2rem !important;
        background: transparent !important;
        border-top: 0 !important;
      }

      .footer a,
      .footer small {
        color: rgba(214, 223, 241, 0.82) !important;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.65);
      }

      @media (max-width: 576px) {
        .col-lg-10 > .d-flex.justify-content-center.align-items-center.flex-wrap.flex-lg-nowrap {
          flex-wrap: nowrap !important;
          gap: 2px !important;
          align-items: center !important;
          justify-content: center !important;
        }

        .col-lg-10 > .d-flex.justify-content-center.align-items-center.flex-wrap.flex-lg-nowrap > img {
          width: 56vw !important;
          max-width: 56vw !important;
          height: auto !important;
        }

        .col-lg-10 > .d-flex.justify-content-center.align-items-center.flex-wrap.flex-lg-nowrap > div {
          margin-left: -10px !important;
          margin-top: 0 !important;
          flex: 0 0 auto !important;
        }

        .col-lg-10 > .d-flex.justify-content-center.align-items-center.flex-wrap.flex-lg-nowrap > div img {
          height: clamp(44px, 12vw, 72px) !important;
          min-height: 0 !important;
          width: auto !important;
        }

        #home-auth-actions {
          margin-top: 3.6rem !important;
          transform: translateY(2rem) !important;
          display: flex !important;
          justify-content: center !important;
          align-items: center !important;
          flex-wrap: nowrap !important;
          gap: 0.45rem !important;
        }

        #home-auth-actions .btn {
          margin: 0 !important;
          padding: 0.5rem 0.95rem !important;
          font-size: 0.94rem !important;
          line-height: 1.2 !important;
          white-space: nowrap !important;
        }

        #home-auth-actions ~ h3 {
          font-size: 1.08rem !important;
          line-height: 1.28 !important;
          margin-top: 4.1rem !important;
        }

        #home-auth-actions ~ h3 p {
          margin: 0.22rem 0 !important;
        }
      }
    </style>
  {% endif %}
{% endblock %}

{% block content %}
  <div class="container">
    {{ content | safe }}
  </div>
{% endblock %}

{% block scripts %}
  {{ Assets.js("assets/js/page.js") }}
{% endblock %}
